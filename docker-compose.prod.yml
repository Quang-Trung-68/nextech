# NexTech — production stack (PostgreSQL + Soketi + Backend + Frontend + Nginx + Certbot)
# Chạy từ root repo:
#   1. Lần đầu SSL: bash init-letsencrypt.sh  (cần .env với CERTBOT_EMAIL, domain trỏ về VPS)
#   2. Deploy:     bash scripts/deploy.sh
#   3. Seed:       COMPOSE_FILE=docker-compose.prod.yml bash scripts/seed-all.sh
#
# Chỉ Nginx mở cổng 80/443 ra internet. Backend / frontend / Soketi / Postgres chỉ trong mạng Docker.
# Biến POSTGRES_*, VITE_*, CLIENT_URL, … lấy từ file .env ở thư mục gốc (cùng cấp compose).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextech}
      POSTGRES_DB: ${POSTGRES_DB:-nextech}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nextech} -d ${POSTGRES_DB:-nextech}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  soketi:
    # CI pushes to ghcr.io — set GHCR_PREFIX in root .env (e.g. ghcr.io/yourgithubuser)
    image: ${GHCR_PREFIX:-ghcr.io/your-github-org}/nextech-soketi:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.soketi
    restart: unless-stopped
    expose:
      - "6001"
    volumes:
      - ./backend/soketi.json:/app/soketi.json:ro

  backend:
    image: ${GHCR_PREFIX:-ghcr.io/your-github-org}/nextech-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./backend/prisma/seeds/data:/app/prisma/seeds/data:ro
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nextech}:${POSTGRES_PASSWORD:-nextech}@postgres:5432/${POSTGRES_DB:-nextech}?schema=public
      PORT: "3000"
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-https://nextech.io.vn}
      FRONTEND_URL: ${FRONTEND_URL:-https://nextech.io.vn}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://api.nextech.io.vn/api/auth/google/callback}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL:-https://api.nextech.io.vn/api/auth/facebook/callback}
      SOKETI_HOST: soketi
      SOKETI_PORT: "6001"
    depends_on:
      postgres:
        condition: service_healthy
      soketi:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  frontend:
    image: ${GHCR_PREFIX:-ghcr.io/your-github-org}/nextech-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_SOKETI_APP_KEY: ${VITE_SOKETI_APP_KEY}
        VITE_SOKETI_HOST: ${VITE_SOKETI_HOST}
        VITE_SOKETI_PORT: ${VITE_SOKETI_PORT}
        VITE_SOKETI_FORCE_TLS: ${VITE_SOKETI_FORCE_TLS}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - soketi

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:

networks:
  default:
    name: nextech-network
