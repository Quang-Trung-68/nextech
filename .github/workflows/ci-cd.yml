# NexTech — lint → build & push to ghcr.io → SSH deploy (production)
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: ESLint (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run lint

  build-and-push:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: backend
            context: ./backend
            file: ./backend/Dockerfile
            image: nextech-backend
            needs_vite: false
          - id: soketi
            context: ./backend
            file: ./backend/Dockerfile.soketi
            image: nextech-soketi
            needs_vite: false
          - id: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            image: nextech-frontend
            needs_vite: true

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase GitHub owner (ghcr.io requires lowercase)
        id: owner
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (backend / soketi)
        if: matrix.needs_vite != true
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (frontend)
        if: matrix.needs_vite == true
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ matrix.image }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
            VITE_SOKETI_APP_KEY=${{ secrets.VITE_SOKETI_APP_KEY }}
            VITE_SOKETI_HOST=${{ secrets.VITE_SOKETI_HOST }}
            VITE_SOKETI_PORT=${{ secrets.VITE_SOKETI_PORT }}
            VITE_SOKETI_FORCE_TLS=${{ secrets.VITE_SOKETI_FORCE_TLS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_READ_TOKEN,GHCR_USER
          debug: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git pull origin main
            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull backend frontend soketi
            docker compose -f docker-compose.prod.yml up -d --no-build
            set +u
            [ -f .env ] && . ./.env
            set -u
            PG_USER="${POSTGRES_USER:-nextech}"
            until docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U "$PG_USER" >/dev/null 2>&1; do
              sleep 2
            done
            docker compose -f docker-compose.prod.yml exec -T backend npx prisma generate
            docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
