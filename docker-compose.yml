services:

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: nextech_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nextech_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Soketi (Self-hosted Pusher-compatible WS server)
  # ─────────────────────────────────────────────
  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    container_name: nextech_soketi
    restart: unless-stopped
    environment:
      SOKETI_DEBUG: "0"
      SOKETI_DEFAULT_APP_ID: ${SOKETI_APP_ID}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_APP_SECRET}
      SOKETI_DEFAULT_APP_MAX_CONNS: ${SOKETI_DEFAULT_APP_MAX_CONNS}
    networks:
      - nextech_net

  # ─────────────────────────────────────────────
  # Backend (Node.js / Express)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextech_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      soketi:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      CLIENT_URL: ${CLIENT_URL}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      APP_NAME: ${APP_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL}
      # Soketi connection (from backend to soketi container)
      SOKETI_APP_ID: ${SOKETI_APP_ID}
      SOKETI_APP_KEY: ${SOKETI_APP_KEY}
      SOKETI_APP_SECRET: ${SOKETI_APP_SECRET}
      SOKETI_HOST: soketi
      SOKETI_PORT: 6001
      PUSHER_USE_TLS: "false"
    networks:
      - nextech_net

  # ─────────────────────────────────────────────
  # Frontend (React / Vite → served by Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_SOKETI_APP_KEY: ${VITE_SOKETI_APP_KEY}
        VITE_SOKETI_HOST: ${VITE_SOKETI_HOST}
        VITE_SOKETI_PORT: ${VITE_SOKETI_PORT}
        VITE_SOKETI_FORCE_TLS: ${VITE_SOKETI_FORCE_TLS}
    container_name: nextech_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - nextech_net

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy (entry point)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nextech_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - nextech_net

  # ─────────────────────────────────────────────
  # Certbot (SSL Certificate Management)
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: nextech_certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  nextech_net:
    driver: bridge
