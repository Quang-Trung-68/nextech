# NexTech — stack dev (Node + Vite + PostgreSQL 16)
# Chạy từ root: docker compose up -d
#
# Kết nối DBeaver / GUI (từ máy host):
#   Host: localhost
#   Port: 5433 (map từ container 5432 — xem services.postgres.ports)
#   Database: giống POSTGRES_DB (mặc định nextech)
#   User / Password: giống POSTGRES_USER / POSTGRES_PASSWORD (mặc định nextech / nextech)
#   Hoặc copy từ biến trong file .env cùng thư mục với compose (POSTGRES_*).
#
# Ứng dụng:
#   Frontend: http://localhost:5173
#   API:      http://localhost:3000/api
#   Soketi:   ws://localhost:6001 (WebSocket — Pusher-compatible)
#
# Soketi & Docker:
# - Trình duyệt chạy trên máy host → WebSocket phải tới localhost:6001 (port map từ service soketi).
# - Backend trong mạng Docker → SOKETI_HOST=soketi (đã set ở service backend).
# - VITE_* được Vite embed lúc dev server chạy; bật realtime: VITE_SOKETI_ENABLED=true + các biến dưới.
#
# Lưu ý: backend/.env và frontend/.env vẫn dùng cho secret; DATABASE_URL trong backend
# được override để trỏ tới service `postgres` trong mạng Docker.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextech}
      POSTGRES_DB: ${POSTGRES_DB:-nextech}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-nextech} -d ${POSTGRES_DB:-nextech}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  soketi:
    build:
      context: ./backend
      dockerfile: Dockerfile.soketi
    restart: unless-stopped
    ports:
      - "6001:6001"
    volumes:
      - ./backend/soketi.json:/app/soketi.json:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      # Seed: prisma/seed_products.js đọc /app/products.json (cùng tên file ở root repo)
      - ./products.json:/app/products.json:ro
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nextech}:${POSTGRES_PASSWORD:-nextech}@postgres:5432/${POSTGRES_DB:-nextech}?schema=public
      PORT: "3000"
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback
      FACEBOOK_CALLBACK_URL: http://localhost:3000/api/auth/facebook/callback
      SOKETI_HOST: soketi
      SOKETI_PORT: "6001"
    depends_on:
      postgres:
        condition: service_healthy
      soketi:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_URL: http://localhost:3000/api
      DOCKER: "true"
      # Phải bật để pusher.js không dùng noop (trước đây false → Soketi “không chạy” dù container soketi OK).
      # Trình duyệt kết nối tới host localhost:6001 — KHÔNG dùng hostname "soketi" (chỉ resolve trong Docker).
      VITE_SOKETI_ENABLED: "true"
      VITE_SOKETI_APP_KEY: nextech-key
      VITE_SOKETI_HOST: localhost
      VITE_SOKETI_PORT: "6001"
      VITE_SOKETI_FORCE_TLS: "false"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
