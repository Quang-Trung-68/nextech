# =============================================================================
# NexTech — Nginx Reverse Proxy Configuration
# Handles:
#   nextech.io.vn / www.nextech.io.vn  → frontend container
#   api.nextech.io.vn                   → backend container
#   api.nextech.io.vn/app/*             → soketi container (WSS)
# =============================================================================

# Upstream services on the Docker internal network
upstream frontend_app {
    server frontend:80;
}

upstream backend_app {
    server backend:3000;
}

upstream soketi_app {
    server soketi:6001;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect + ACME challenge for nextech.io.vn & www
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name nextech.io.vn www.nextech.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nextech.io.vn$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Frontend: nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name nextech.io.vn www.nextech.io.vn;

    ssl_certificate /etc/letsencrypt/live/nextech.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextech.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www
    if ($host = www.nextech.io.vn) {
        return 301 https://nextech.io.vn$request_uri;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect + ACME challenge for api.nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.nextech.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Backend API: api.nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.nextech.io.vn;

    ssl_certificate /etc/letsencrypt/live/api.nextech.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nextech.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Increase body size for image/file uploads (Cloudinary etc.)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── Soketi WebSocket proxy (wss://api.nextech.io.vn/app/...) ──────────────
    # Pusher-js connects to /app/<key>
    location ~ ^/(app|apps)/ {
        proxy_pass http://soketi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Express API ───────────────────────────────────────────────────────────
    location / {
        # Forward the Origin header so Express cors() can match it
        proxy_set_header Origin $http_origin;

        # Handle CORS preflight at Nginx level
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
