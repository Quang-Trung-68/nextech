# =============================================================================
# NexTech — Nginx Reverse Proxy Configuration
# =============================================================================

# Use Docker's internal DNS so Nginx can resolve container names dynamically
# (prevents "host not found in upstream" crash if a container starts after Nginx)
resolver 127.0.0.11 valid=10s ipv6=off;

upstream frontend_app {
    server frontend:80;
}

upstream backend_app {
    server backend:3000;
}

upstream soketi_app {
    server soketi:6001;
}

# chat-client / chat-server: KHÔNG dùng upstream { server chat-client:80 } — Nginx resolve tên
# khi load config; nếu stack chat-app chưa chạy → "host not found in upstream".
# Dùng biến + proxy_pass để resolve qua Docker DNS lúc request (cần resolver ở trên).

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect for nextech.io.vn & www
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name nextech.io.vn www.nextech.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nextech.io.vn$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Frontend: nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name nextech.io.vn www.nextech.io.vn;

    ssl_certificate /etc/letsencrypt/live/nextech.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextech.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect for api.nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.nextech.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Backend API: api.nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.nextech.io.vn;

    ssl_certificate /etc/letsencrypt/live/api.nextech.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nextech.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # ── Soketi WebSocket proxy (wss://api.nextech.io.vn/app/...) ─────────────
    location ~ ^/(app|apps)/ {
        proxy_pass http://soketi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── CORS preflight — handle OPTIONS separately ────────────────────────────
    location / {
        # Pass all CORS headers through from the backend response
        # add_header Access-Control-Allow-Origin $http_origin always;
        # add_header Access-Control-Allow-Credentials true always;
        # add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        # add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Requested-With' always;

        # Short-circuit OPTIONS preflight — don't hit the backend
        # if ($request_method = 'OPTIONS') {
        #     add_header Access-Control-Max-Age 86400;
        #     add_header Content-Length 0;
        #     return 204;
        # }

        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── chat-app: cần cert tại /etc/letsencrypt/live/chat.nextech.io.vn/ (SAN gồm chat + api.chat).
#    Chạy certbot trước khi reload nginx nếu file chưa có — hoặc tạm comment các block listen 443 bên dưới.
# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect for chat.nextech.io.vn (chat-app SPA)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name chat.nextech.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — chat-app frontend: chat.nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name chat.nextech.io.vn;

    ssl_certificate /etc/letsencrypt/live/chat.nextech.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.nextech.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        set $chat_client "chat-client:80";
        proxy_pass http://$chat_client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect for api.chat.nextech.io.vn (chat-app API + Socket.IO)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.chat.nextech.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — chat-app API: api.chat.nextech.io.vn
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.chat.nextech.io.vn;

    ssl_certificate /etc/letsencrypt/live/chat.nextech.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.nextech.io.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # App Socket.IO path (apps/server: path `/ws`)
    location /ws {
        set $chat_server "chat-server:5000";
        proxy_pass http://$chat_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        set $chat_server_api "chat-server:5000";
        proxy_pass http://$chat_server_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
